<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>축의금 계산기 - 고민 해결! 🧧</title>
    <link rel="stylesheet" href="style.css">
    <!-- 화면 캡처 라이브러리 -->
    <script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>
</head>
<body>
    <div class="container">
        <button id="theme-toggle" title="테마 전환">🌙</button>
        <div id="app">
            <!-- 시작 화면 -->
            <div id="start-container" class="card">
                <h1>축의금 계산기 🧧</h1>
                <p class="subtitle">얼마를 내야 할지 고민되시나요?<br>몇 가지 질문으로 적정 금액을 추천해 드립니다.</p>
                <button id="start-btn" class="main-btn">시작하기</button>
            </div>

            <!-- 질문 화면 -->
            <div id="question-container" class="card hidden">
                <div class="progress-bar"><div id="progress" style="width: 0%"></div></div>
                <div id="question-text">질문을 불러오는 중...</div>
                <div id="options-container"></div>
            </div>

            <!-- 결과 화면 -->
            <div id="result-container" class="card hidden">
                <div id="capture-area">
                    <div id="final-amount">0원</div>
                    <p id="result-desc"></p>
                    
                    <div class="stats-box">
                        <p id="stats-text"></p>
                        <div class="stats-bar"><div id="stats-fill"></div></div>
                    </div>
                </div>
                
                <!-- 선물 추천 섹션 -->
                <div id="ad-section" class="ad-box">
                    <p class="ad-label">🎁 맞춤 선물 추천</p>
                    <a id="ad-link" href="#" target="_blank" class="ad-item">
                        <span id="ad-title">선물 보러가기</span>
                        <span class="ad-go">이동하기 ></span>
                    </a>
                </div>

                <div class="share-group">
                    <button id="save-img-btn" class="action-btn save-btn">🖼️ 이미지 저장</button>
                    <button id="copy-link-btn" class="action-btn copy-btn">🔗 링크 복사</button>
                </div>
                
                <!-- 하객룩 섹션 -->
                <div class="shopping-section">
                    <p>👗 오늘 뭐 입지? <a href="https://search.shopping.naver.com/search/all?query=%ED%95%98%EA%B0%9D%EB%A3%A9" target="_blank" id="outfit-link">추천 하객룩 보기</a></p>
                </div>

                <button id="restart-btn" class="secondary-btn">다시 계산하기</button>
            </div>
        </div>
    </div>
    <script src="main.js"></script>
</body>
</html>
