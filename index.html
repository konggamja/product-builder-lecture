<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>축의금 계산기 - 센스 있는 하객의 필수 선택 💸</title>
    <meta name="description" content="축의금 얼마나 낼지 고민되시나요? 상황별 맞춤 축의금 계산기로 적정 금액을 확인하고 센스 있는 하객이 되어보세요.">
    <link rel="stylesheet" href="style.css">
    
    <!-- Google tag (gtag.js) -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-NGL9YGXQNT"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'G-NGL9YGXQNT');
    </script>

    <!-- 구글 애드센스 코드 -->
    <meta name="google-adsense-account" content="ca-pub-8835535035630751">
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-8835535035630751" crossorigin="anonymous"></script>

    <!-- 화면 캡처 라이브러리 -->
    <script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>
</head>
<body>
    <!-- 🧭 상단 네비게이션 -->
    <nav class="navbar">
        <div class="nav-content">
            <a href="index.html" class="nav-logo">WeddingGuide 💸</a>
            <ul class="nav-menu">
                <li><a href="index.html#app">축의금 계산기</a></li>
                <li><a href="blog.html">웨딩 가이드</a></li>
                <li><a href="privacy.html">개인정보처리방침</a></li>
            </ul>
        </div>
    </nav>

    <div class="container">
        <button id="theme-toggle" title="테마 전환">🌙</button>
        
        <!-- 📱 메인 앱 섹션 -->
        <div id="app" class="section-padding">
            <!-- 시작 화면 -->
            <div id="start-container" class="card">
                <h1>축의금 계산기 💸</h1>
                <p class="subtitle">얼마를 내야 할지 고민되시나요?<br>몇 가지 질문으로 적정 금액을 추천해 드립니다.</p>
                <button id="start-btn" class="main-btn">시작하기</button>
            </div>

            <!-- 질문 화면 -->
            <div id="question-container" class="card hidden">
                <div class="progress-bar"><div id="progress" style="width: 0%"></div></div>
                <div id="question-text">질문을 불러오는 중...</div>
                <div id="options-container"></div>
            </div>

            <!-- 결과 화면 -->
            <div id="result-container" class="card hidden">
                <!-- 이미지로 저장될 영역: 청첩장 스타일 -->
                <div id="capture-area" class="invitation-card">
                    <div class="invitation-inner">
                        <div class="invitation-header">
                            <span class="invitation-icon">💌</span>
                            <p class="invitation-subtitle">HAPPY WEDDING</p>
                        </div>
                        
                        <div class="invitation-content">
                            <p class="invitation-label">적정 축의금 추천</p>
                            <div id="final-amount" class="invitation-amount">0원</div>
                            <div class="invitation-divider"></div>
                            <p id="result-desc" class="invitation-message"></p>
                        </div>

                        <div class="invitation-footer">
                            <div class="stats-box">
                                <p id="stats-text"></p>
                                <div class="stats-bar"><div id="stats-fill"></div></div>
                            </div>
                            <p class="app-url">wedding-calculator.com</p>
                        </div>
                    </div>
                </div>
                
                <div class="share-group">
                    <button id="save-img-btn" class="action-btn save-btn">✨ 이미지로 간직하기</button>
                    <button id="copy-link-btn" class="action-btn copy-btn">🔗 링크 복사</button>
                </div>
                
                <button id="restart-btn" class="secondary-btn">다시 계산하기</button>
            </div>
        </div>
    </div>

    <!-- 🚩 푸터 영역 -->
    <footer>
        <div class="footer-content">
            <p>© 2026 WeddingGuide. All rights reserved.</p>
            <div class="footer-links">
                <a href="blog.html">웨딩 가이드</a>
                <a href="privacy.html">개인정보처리방침</a>
                <a href="mailto:zzipupzz@gmail.com">제휴 및 문의</a>
            </div>
        </div>
    </footer>

    <script src="main.js"></script>
</body>
</html>
